name: Bug Report
description: Report a bug in markdown-extract
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: markdown-extract version
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python Version
      description: Python version (e.g. 3.12)
    validations:
      required: true
